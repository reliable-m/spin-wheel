<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Lets Vibe Code Spin Wheel</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <!-- canvas-confetti for celebrations -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1>⚡ Code Spin ⚡</h1>
    <div class="remaining-badge" id="remainingCounter">7 remaining</div>

    <div class="wheel-container">
      <div class="wheel" id="wheel">
        <div class="wheel-inner">
          <div id="wheelDisplay">🎰</div>
        </div>
      </div>
    </div>

    <button class="spin-btn" id="spinButton">SPIN</button>
    <div id="result"></div>
    <div class="footer-note">🔥 lets have fun ladies 🔥</div>
  </div>

  <!-- External JavaScript -->
  <script src="script.js"></script>
</body>
</html>
